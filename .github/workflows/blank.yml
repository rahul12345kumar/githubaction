name: Azure CI

on:
  push:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Azure Login (User Assigned Managed Identity)
      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ✅ Azure CLI (works on self-hosted Windows/Linux both)
      - name: Azure CLI Script
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az account show

      # ✅ Azure PowerShell
      - name: Azure PowerShell Script
        uses: azure/powershell@v3
        with:
          azPSVersion: latest
          inlineScript: |
            Get-AzContext
